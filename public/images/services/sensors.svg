<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="deviceG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="screenG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#011a12"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="tankG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <radialGradient id="wifiGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dp" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="0.8" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#dp)"/>

  <!-- Circuit board background pattern -->
  <line x1="100" y1="50" x2="100" y2="450" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="50" x2="200" y2="450" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="300" y1="50" x2="300" y2="450" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="400" y1="50" x2="400" y2="450" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="500" y1="50" x2="500" y2="450" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="600" y1="50" x2="600" y2="450" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="700" y1="50" x2="700" y2="450" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="100" x2="800" y2="100" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#059669" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#059669" stroke-width="0.5" opacity="0.08"/>

  <!-- Dots at intersections -->
  <circle cx="100" cy="100" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="300" cy="100" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="500" cy="100" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="700" cy="100" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="100" cy="300" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="300" cy="300" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="700" cy="300" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="100" cy="400" r="2.5" fill="#059669" opacity="0.2"/>
  <circle cx="700" cy="400" r="2.5" fill="#059669" opacity="0.2"/>

  <!-- ===== STORAGE TANK (left, small) ===== -->
  <rect x="60" y="200" width="100" height="200" rx="6" fill="url(#tankG)"/>
  <ellipse cx="110" cy="200" rx="50" ry="14" fill="#10B981"/>
  <ellipse cx="110" cy="400" rx="50" ry="12" fill="#047857"/>
  <rect x="65" y="207" width="18" height="188" rx="3" fill="rgba(255,255,255,0.1)"/>
  <line x1="60" y1="260" x2="160" y2="260" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <line x1="60" y1="330" x2="160" y2="330" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Tank fill level -->
  <rect x="74" y="213" width="6" height="182" rx="2" fill="rgba(0,0,0,0.25)"/>
  <rect x="74" y="285" width="6" height="110" rx="2" fill="#F59E0B" opacity="0.85"/>
  <text x="110" y="305" text-anchor="middle" font-family="Arial Black" font-size="11" fill="rgba(255,255,255,0.9)">TANK</text>
  <!-- Sensor mounted on tank -->
  <rect x="142" y="215" width="35" height="50" rx="6" fill="url(#deviceG)" stroke="#10B981" stroke-width="1.5"/>
  <rect x="147" y="222" width="25" height="22" rx="3" fill="#022C22"/>
  <circle cx="154" cy="252" r="4" fill="#10B981"/>
  <circle cx="167" cy="252" r="4" fill="#374151"/>
  <!-- Sensor signal wire -->
  <line x1="177" y1="240" x2="230" y2="240" stroke="#10B981" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ===== MAIN IoT SENSOR DEVICE (center) ===== -->
  <g filter="url(#glow)">
    <!-- Device body -->
    <rect x="290" y="150" width="220" height="280" rx="20" fill="url(#deviceG)" stroke="#10B981" stroke-width="2"/>
    <!-- Device highlight -->
    <rect x="295" y="155" width="60" height="270" rx="16" fill="rgba(255,255,255,0.03)"/>
    <!-- Top connector -->
    <rect x="385" y="130" width="30" height="25" rx="5" fill="#374151" stroke="#10B981" stroke-width="1"/>
    <rect x="390" y="118" width="20" height="15" rx="4" fill="#4B5563"/>
    <!-- Screen -->
    <rect x="305" y="165" width="190" height="130" rx="10" fill="url(#screenG)"/>
    <!-- Screen content -->
    <text x="400" y="192" text-anchor="middle" font-family="Arial" font-size="9" fill="#059669">PETRONEAR IoT</text>
    <text x="400" y="210" text-anchor="middle" font-family="Arial Black" font-size="24" fill="#10B981">٧٨٪</text>
    <text x="400" y="228" text-anchor="middle" font-family="Arial" font-size="9" fill="#F59E0B">مستوى الخزان</text>
    <!-- Mini graph on screen -->
    <polyline points="315,270 335,255 355,262 375,245 395,250 415,238 435,242 455,230 475,235 490,228" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="305" y="280" width="190" height="1" fill="#064E3B"/>
    <!-- LED indicators -->
    <circle cx="320" cy="315" r="6" fill="#10B981" opacity="0.9"/>
    <circle cx="340" cy="315" r="6" fill="#10B981" opacity="0.5"/>
    <circle cx="360" cy="315" r="6" fill="#374151"/>
    <circle cx="380" cy="315" r="6" fill="#F59E0B" opacity="0.9"/>
    <text x="320" y="332" text-anchor="middle" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">PWR</text>
    <text x="340" y="332" text-anchor="middle" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">NET</text>
    <text x="360" y="332" text-anchor="middle" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">ERR</text>
    <text x="380" y="332" text-anchor="middle" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">ALM</text>
    <!-- Bottom buttons -->
    <rect x="330" y="350" width="50" height="14" rx="7" fill="#064E3B" stroke="#059669" stroke-width="1"/>
    <rect x="420" y="350" width="50" height="14" rx="7" fill="url(#goldG)" opacity="0.8"/>
    <text x="355" y="361" text-anchor="middle" font-family="Arial" font-size="8" fill="#10B981">RESET</text>
    <text x="445" y="361" text-anchor="middle" font-family="Arial" font-size="8" fill="#022C22" font-weight="bold">SYNC</text>
    <!-- Bottom label -->
    <rect x="340" y="375" width="120" height="38" rx="6" fill="#022C22" stroke="#064E3B" stroke-width="1"/>
    <text x="400" y="390" text-anchor="middle" font-family="Arial Black" font-size="10" fill="#F59E0B">PN-SENSOR-PRO</text>
    <text x="400" y="405" text-anchor="middle" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.3)">S/N: PT2024-00342</text>
  </g>

  <!-- ===== WiFi SIGNAL WAVES ===== -->
  <!-- Glow circle -->
  <circle cx="400" cy="95" r="55" fill="url(#wifiGlow)"/>
  <!-- Wave arcs -->
  <path d="M358 108 Q400 72 442 108" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <path d="M340 120 Q400 68 460 120" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M322 132 Q400 64 478 132" fill="none" stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Center dot -->
  <circle cx="400" cy="128" r="5" fill="#10B981"/>
  <circle cx="400" cy="128" r="9" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.4"/>

  <!-- ===== DASHBOARD SCREEN (right) ===== -->
  <rect x="560" y="130" width="190" height="280" rx="16" fill="url(#deviceG)" stroke="#059669" stroke-width="1.5"/>
  <rect x="570" y="143" width="170" height="200" rx="8" fill="url(#screenG)"/>
  <!-- Screen header -->
  <rect x="570" y="143" width="170" height="28" rx="8" fill="#064E3B"/>
  <circle cx="583" cy="157" r="4" fill="#10B981"/>
  <circle cx="583" cy="157" r="2" fill="#34D399"/>
  <text x="610" y="162" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">لوحة المراقبة</text>
  <!-- Data rows -->
  <rect x="578" y="182" width="154" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <text x="584" y="195" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.5)">درجة الحرارة</text>
  <text x="716" y="195" text-anchor="end" font-family="Arial Black" font-size="9" fill="#10B981">٢٣.٥°C</text>
  <rect x="578" y="206" width="154" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <text x="584" y="219" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.5)">الضغط</text>
  <text x="716" y="219" text-anchor="end" font-family="Arial Black" font-size="9" fill="#F59E0B">١.٢ bar</text>
  <rect x="578" y="230" width="154" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <text x="584" y="243" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.5)">معدل التدفق</text>
  <text x="716" y="243" text-anchor="end" font-family="Arial Black" font-size="9" fill="#10B981">٨٥ L/m</text>
  <rect x="578" y="254" width="154" height="18" rx="4" fill="rgba(255,255,255,0.04)"/>
  <text x="584" y="267" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.5)">آخر طلب</text>
  <text x="716" y="267" text-anchor="end" font-family="Arial Black" font-size="9" fill="rgba(255,255,255,0.7)">٢ ساعة</text>
  <!-- Mini bar chart -->
  <rect x="578" y="278" width="154" height="55" rx="4" fill="rgba(0,0,0,0.2)"/>
  <rect x="586" y="310" width="14" height="18" rx="2" fill="#10B981" opacity="0.7"/>
  <rect x="606" y="298" width="14" height="30" rx="2" fill="#10B981" opacity="0.8"/>
  <rect x="626" y="303" width="14" height="25" rx="2" fill="#10B981" opacity="0.7"/>
  <rect x="646" y="290" width="14" height="38" rx="2" fill="#F59E0B" opacity="0.85"/>
  <rect x="666" y="300" width="14" height="28" rx="2" fill="#10B981" opacity="0.75"/>
  <rect x="686" y="294" width="14" height="34" rx="2" fill="#10B981" opacity="0.8"/>
  <rect x="706" y="287" width="14" height="41" rx="2" fill="#10B981"/>
  <!-- Bottom status -->
  <rect x="570" y="355" width="170" height="40" rx="8" fill="#064E3B"/>
  <circle cx="587" cy="375" r="6" fill="#10B981" opacity="0.9"/>
  <circle cx="587" cy="375" r="3" fill="#34D399"/>
  <text x="602" y="371" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">اتصال نشط</text>
  <text x="602" y="385" font-family="Arial Black" font-size="10" fill="#F59E0B">بترونير IoT</text>
  <!-- Signal bars on device -->
  <rect x="680" y="360" width="5" height="8" rx="2" fill="#10B981" opacity="0.4"/>
  <rect x="688" y="355" width="5" height="13" rx="2" fill="#10B981" opacity="0.65"/>
  <rect x="696" y="349" width="5" height="19" rx="2" fill="#10B981" opacity="0.9"/>
  <rect x="704" y="342" width="5" height="26" rx="2" fill="#10B981"/>

  <!-- Connection lines (device to screen) -->
  <line x1="510" y1="250" x2="560" y2="250" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <circle cx="510" cy="250" r="4" fill="#059669" opacity="0.6"/>
  <!-- Connection lines (tank to device) -->
  <line x1="177" y1="240" x2="290" y2="240" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
</svg>
