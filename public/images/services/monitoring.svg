<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="monitorG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="screenG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#011a12"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="barGold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dp" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="9" r="0.8" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#dp)"/>

  <!-- Background glow -->
  <ellipse cx="400" cy="280" rx="300" ry="200" fill="#059669" opacity="0.05"/>

  <!-- ===== MAIN MONITOR ===== -->
  <g filter="url(#glow)">
    <!-- Monitor frame -->
    <rect x="80" y="60" width="640" height="360" rx="16" fill="url(#monitorG)" stroke="#10B981" stroke-width="2"/>
    <!-- Screen bezel -->
    <rect x="92" y="72" width="616" height="336" rx="10" fill="url(#screenG)"/>

    <!-- ===== SCREEN CONTENT ===== -->
    <!-- Top header bar -->
    <rect x="92" y="72" width="616" height="44" rx="10" fill="#064E3B"/>
    <!-- Logo area -->
    <circle cx="120" cy="94" r="14" fill="#059669"/>
    <text x="120" y="99" text-anchor="middle" font-family="Arial Black" font-size="10" fill="white">PN</text>
    <text x="145" y="90" font-family="Arial Black" font-size="13" fill="white">بترونير</text>
    <text x="145" y="105" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">لوحة المراقبة المركزية</text>
    <!-- Live indicator -->
    <circle cx="640" cy="87" r="5" fill="#10B981"/>
    <circle cx="640" cy="87" r="3" fill="#34D399" opacity="0.9"/>
    <text x="653" y="91" font-family="Arial" font-size="10" fill="#10B981">مباشر</text>
    <!-- Time -->
    <text x="400" y="97" text-anchor="middle" font-family="Arial Black" font-size="14" fill="rgba(255,255,255,0.6)">١٤:٣٨:٢٢</text>

    <!-- ===== LEFT PANEL - Tank levels ===== -->
    <rect x="100" y="124" width="200" height="272" rx="8" fill="rgba(0,0,0,0.2)"/>
    <text x="200" y="144" text-anchor="middle" font-family="Arial Black" font-size="11" fill="#F59E0B">مستويات الخزانات</text>

    <!-- Tank A -->
    <text x="112" y="167" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">خزان A — الرياض</text>
    <rect x="112" y="172" width="176" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
    <rect x="112" y="172" width="145" height="10" rx="5" fill="url(#barGreen)"/>
    <text x="292" y="181" font-family="Arial Black" font-size="9" fill="#10B981">٨٢٪</text>

    <!-- Tank B -->
    <text x="112" y="200" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">خزان B — جدة</text>
    <rect x="112" y="205" width="176" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
    <rect x="112" y="205" width="63" height="10" rx="5" fill="url(#barGold)"/>
    <text x="292" y="214" font-family="Arial Black" font-size="9" fill="#F59E0B">٣٦٪</text>

    <!-- Tank C -->
    <text x="112" y="233" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">خزان C — الدمام</text>
    <rect x="112" y="238" width="176" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
    <rect x="112" y="238" width="118" height="10" rx="5" fill="url(#barGreen)"/>
    <text x="292" y="247" font-family="Arial Black" font-size="9" fill="#10B981">٦٧٪</text>

    <!-- Tank D -->
    <text x="112" y="266" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">خزان D — الخبر</text>
    <rect x="112" y="271" width="176" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
    <rect x="112" y="271" width="160" height="10" rx="5" fill="url(#barGreen)"/>
    <text x="292" y="280" font-family="Arial Black" font-size="9" fill="#10B981">٩١٪</text>

    <!-- Tank E -->
    <text x="112" y="299" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.6)">خزان E — مكة</text>
    <rect x="112" y="304" width="176" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
    <rect x="112" y="304" width="98" height="10" rx="5" fill="url(#barGreen)"/>
    <text x="292" y="313" font-family="Arial Black" font-size="9" fill="#10B981">٥٦٪</text>

    <!-- Alert box -->
    <rect x="107" y="330" width="186" height="55" rx="8" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
    <text x="118" y="347" font-family="Arial Black" font-size="9" fill="#F59E0B">⚠ تنبيه</text>
    <text x="118" y="360" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.6)">خزان B — جدة منخفض</text>
    <text x="118" y="373" font-family="Arial" font-size="8" fill="#F59E0B">إرسال طلب تلقائياً...</text>

    <!-- ===== CENTER CHART ===== -->
    <rect x="312" y="124" width="270" height="180" rx="8" fill="rgba(0,0,0,0.2)"/>
    <text x="447" y="144" text-anchor="middle" font-family="Arial Black" font-size="11" fill="#F59E0B">الاستهلاك الأسبوعي (لتر)</text>
    <!-- Chart axes -->
    <line x1="330" y1="290" x2="570" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <line x1="330" y1="155" x2="330" y2="290" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Chart bars -->
    <rect x="340" y="235" width="24" height="55" rx="4" fill="url(#barGreen)" opacity="0.8"/>
    <rect x="376" y="215" width="24" height="75" rx="4" fill="url(#barGreen)" opacity="0.9"/>
    <rect x="412" y="248" width="24" height="42" rx="4" fill="url(#barGreen)" opacity="0.8"/>
    <rect x="448" y="200" width="24" height="90" rx="4" fill="url(#barGold)" opacity="0.9"/>
    <rect x="484" y="220" width="24" height="70" rx="4" fill="url(#barGreen)" opacity="0.8"/>
    <rect x="520" y="165" width="24" height="125" rx="4" fill="url(#barGreen)"/>
    <!-- Day labels -->
    <text x="352" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.4)">أحد</text>
    <text x="388" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.4)">اثن</text>
    <text x="424" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.4)">ثلا</text>
    <text x="460" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#F59E0B">أرب</text>
    <text x="496" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.4)">خمس</text>
    <text x="532" y="302" text-anchor="middle" font-family="Arial" font-size="8" fill="#10B981">جمع</text>
    <!-- Chart total -->
    <text x="554" y="170" font-family="Arial Black" font-size="10" fill="#10B981">أعلى</text>

    <!-- ===== CENTER DONUT CHART ===== -->
    <rect x="312" y="316" width="270" height="80" rx="8" fill="rgba(0,0,0,0.2)"/>
    <text x="330" y="334" font-family="Arial Black" font-size="10" fill="#F59E0B">إجمالي هذا الشهر</text>
    <text x="330" y="352" font-family="Arial Black" font-size="22" fill="white">٢٤٧,٥٠٠</text>
    <text x="330" y="368" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.4)">لتر ← زيادة ١٢٪ عن الشهر الماضي</text>
    <rect x="450" y="325" width="120" height="60" rx="8" fill="rgba(5,150,105,0.15)"/>
    <circle cx="510" cy="350" r="22" fill="none" stroke="#064E3B" stroke-width="10"/>
    <circle cx="510" cy="350" r="22" fill="none" stroke="#10B981" stroke-width="10" stroke-dasharray="86 52" stroke-dashoffset="25"/>
    <circle cx="510" cy="350" r="22" fill="none" stroke="#F59E0B" stroke-width="10" stroke-dasharray="28 110" stroke-dashoffset="-61"/>
    <text x="510" y="354" text-anchor="middle" font-family="Arial Black" font-size="10" fill="white">٦٢٪</text>

    <!-- ===== RIGHT PANEL ===== -->
    <rect x="594" y="124" width="106" height="272" rx="8" fill="rgba(0,0,0,0.2)"/>
    <text x="647" y="144" text-anchor="middle" font-family="Arial Black" font-size="10" fill="#F59E0B">الطلبات</text>
    <!-- Order items -->
    <rect x="602" y="153" width="90" height="48" rx="6" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="1"/>
    <text x="612" y="168" font-family="Arial" font-size="8" fill="#10B981">جارٍ التسليم</text>
    <text x="612" y="181" font-family="Arial Black" font-size="10" fill="white">#١٠٠٤٢</text>
    <text x="612" y="193" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">٢٥,٠٠٠ لتر</text>

    <rect x="602" y="209" width="90" height="48" rx="6" fill="rgba(245,158,11,0.12)" stroke="#F59E0B" stroke-width="1"/>
    <text x="612" y="224" font-family="Arial" font-size="8" fill="#F59E0B">معالجة</text>
    <text x="612" y="237" font-family="Arial Black" font-size="10" fill="white">#١٠٠٤١</text>
    <text x="612" y="249" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">١٢,٠٠٠ لتر</text>

    <rect x="602" y="265" width="90" height="48" rx="6" fill="rgba(0,0,0,0.2)"/>
    <text x="612" y="280" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.4)">مجدول</text>
    <text x="612" y="293" font-family="Arial Black" font-size="10" fill="rgba(255,255,255,0.7)">#١٠٠٤٠</text>
    <text x="612" y="305" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">٣٠,٠٠٠ لتر</text>

    <!-- KPIs -->
    <rect x="602" y="321" width="90" height="68" rx="6" fill="rgba(0,0,0,0.2)"/>
    <text x="647" y="337" text-anchor="middle" font-family="Arial" font-size="8" fill="rgba(255,255,255,0.4)">وقت الاستجابة</text>
    <text x="647" y="355" text-anchor="middle" font-family="Arial Black" font-size="18" fill="#10B981">١.٨h</text>
    <text x="647" y="370" text-anchor="middle" font-family="Arial" font-size="7" fill="rgba(255,255,255,0.4)">متوسط</text>
    <rect x="609" y="377" width="76" height="5" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="609" y="377" width="60" height="5" rx="2" fill="#10B981" opacity="0.7"/>
  </g>

  <!-- Monitor stand -->
  <rect x="370" y="420" width="60" height="18" rx="4" fill="#1F2937"/>
  <rect x="340" y="435" width="120" height="12" rx="6" fill="#111827"/>
  <rect x="320" y="445" width="160" height="6" rx="3" fill="#1F2937"/>

  <!-- Keyboard suggestion -->
  <rect x="260" y="460" width="280" height="12" rx="4" fill="#111827" opacity="0.5"/>
  <rect x="260" y="460" width="280" height="3" rx="2" fill="#1F2937" opacity="0.5"/>
</svg>
