<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="tankGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="40%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
    <linearGradient id="cabGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#022C22"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#022C22" flood-opacity="0.5"/>
    </filter>
    <pattern id="dotPat" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#sky)"/>
  <rect width="800" height="480" fill="url(#dotPat)"/>

  <!-- Glow under truck -->
  <ellipse cx="400" cy="395" rx="320" ry="25" fill="url(#glowGrad)"/>

  <!-- Ground / road -->
  <rect x="0" y="395" width="800" height="85" fill="#011a12"/>
  <rect x="0" y="395" width="800" height="3" fill="#059669" opacity="0.4"/>
  <!-- Road dashes -->
  <rect x="30" y="403" width="70" height="5" rx="2.5" fill="#F59E0B" opacity="0.25"/>
  <rect x="170" y="403" width="70" height="5" rx="2.5" fill="#F59E0B" opacity="0.25"/>
  <rect x="310" y="403" width="70" height="5" rx="2.5" fill="#F59E0B" opacity="0.25"/>
  <rect x="450" y="403" width="70" height="5" rx="2.5" fill="#F59E0B" opacity="0.25"/>
  <rect x="590" y="403" width="70" height="5" rx="2.5" fill="#F59E0B" opacity="0.25"/>
  <rect x="700" y="403" width="70" height="5" rx="2.5" fill="#F59E0B" opacity="0.25"/>

  <!-- ===== TRAILER TANK ===== -->
  <g filter="url(#shadow)">
    <!-- Rear cap -->
    <ellipse cx="88" cy="270" rx="22" ry="80" fill="#047857"/>
    <!-- Main tank body -->
    <rect x="88" y="190" width="460" height="160" fill="url(#tankGrad)"/>
    <!-- Front cap -->
    <ellipse cx="548" cy="270" rx="22" ry="80" fill="#10B981"/>
    <!-- Highlight strip -->
    <rect x="88" y="195" width="460" height="18" rx="4" fill="rgba(255,255,255,0.12)"/>
    <!-- Bottom shadow -->
    <rect x="88" y="332" width="460" height="18" rx="4" fill="rgba(0,0,0,0.15)"/>
    <!-- Ring bands -->
    <line x1="200" y1="190" x2="200" y2="350" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>
    <line x1="320" y1="190" x2="320" y2="350" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>
    <line x1="440" y1="190" x2="440" y2="350" stroke="rgba(255,255,255,0.12)" stroke-width="4"/>
    <!-- Gold stripe -->
    <rect x="88" y="255" width="460" height="8" fill="url(#goldGrad)" opacity="0.85"/>
    <!-- Company text -->
    <text x="318" y="237" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="rgba(255,255,255,0.95)" letter-spacing="3">PETRONEAR</text>
    <text x="318" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#F59E0B" letter-spacing="4">بترونير</text>
    <!-- Manhole -->
    <ellipse cx="318" cy="190" rx="38" ry="9" fill="#064E3B" stroke="#F59E0B" stroke-width="2.5"/>
    <rect x="310" y="177" width="16" height="13" rx="3" fill="#064E3B" stroke="#F59E0B" stroke-width="2"/>
    <!-- Ladder right side -->
    <line x1="480" y1="196" x2="480" y2="280" stroke="#F59E0B" stroke-width="2.5" opacity="0.9"/>
    <line x1="496" y1="196" x2="496" y2="280" stroke="#F59E0B" stroke-width="2.5" opacity="0.9"/>
    <line x1="480" y1="210" x2="496" y2="210" stroke="#F59E0B" stroke-width="2" opacity="0.9"/>
    <line x1="480" y1="228" x2="496" y2="228" stroke="#F59E0B" stroke-width="2" opacity="0.9"/>
    <line x1="480" y1="246" x2="496" y2="246" stroke="#F59E0B" stroke-width="2" opacity="0.9"/>
    <line x1="480" y1="264" x2="496" y2="264" stroke="#F59E0B" stroke-width="2" opacity="0.9"/>
  </g>

  <!-- Trailer chassis -->
  <rect x="78" y="345" width="480" height="18" rx="4" fill="#022C22"/>
  <!-- Support leg -->
  <rect x="130" y="345" width="10" height="42" fill="#374151" rx="2"/>
  <rect x="120" y="382" width="30" height="8" rx="3" fill="#4B5563"/>

  <!-- ===== CAB ===== -->
  <g filter="url(#shadow)">
    <!-- Cab main body -->
    <path d="M555 230 L555 350 L730 350 L730 252 L705 230 Z" fill="url(#cabGrad)" rx="8"/>
    <!-- Cab roof / sleeper -->
    <rect x="558" y="195" width="145" height="38" rx="8" fill="#022C22"/>
    <!-- Windshield -->
    <path d="M565 230 L700 230 L700 195 L565 195 Z" fill="#7DD3FC" opacity="0.35"/>
    <path d="M570 198 L660 198 L645 228 L570 228 Z" fill="rgba(255,255,255,0.06)"/>
    <!-- Windshield frame -->
    <path d="M565 230 L700 230 L700 195 L565 195 Z" fill="none" stroke="#064E3B" stroke-width="3"/>
    <!-- Side window -->
    <rect x="562" y="242" width="65" height="48" rx="5" fill="#7DD3FC" opacity="0.25"/>
    <rect x="562" y="242" width="65" height="48" rx="5" fill="none" stroke="#064E3B" stroke-width="2"/>
    <!-- Door -->
    <line x1="630" y1="235" x2="630" y2="350" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
    <!-- Door handle -->
    <rect x="618" y="292" width="14" height="5" rx="2.5" fill="#F59E0B"/>
    <!-- Gold stripe on cab -->
    <rect x="555" y="255" width="175" height="7" fill="url(#goldGrad)" opacity="0.85"/>
    <!-- Exhaust pipe -->
    <rect x="562" y="162" width="10" height="35" rx="5" fill="#374151"/>
    <ellipse cx="567" cy="162" rx="7" ry="4" fill="#4B5563"/>
    <!-- Exhaust smoke -->
    <circle cx="560" cy="148" r="7" fill="rgba(255,255,255,0.06)"/>
    <circle cx="565" cy="133" r="5" fill="rgba(255,255,255,0.04)"/>
    <!-- Step bars -->
    <rect x="560" y="325" width="55" height="7" rx="3" fill="#F59E0B" opacity="0.75"/>
    <rect x="560" y="338" width="55" height="5" rx="2.5" fill="#F59E0B" opacity="0.5"/>
    <!-- Front face -->
    <rect x="725" y="235" width="52" height="115" rx="6" fill="#064E3B"/>
    <!-- Grille -->
    <rect x="733" y="270" width="36" height="55" rx="3" fill="#022C22"/>
    <line x1="742" y1="275" x2="742" y2="320" stroke="#059669" stroke-width="1.5" opacity="0.5"/>
    <line x1="752" y1="275" x2="752" y2="320" stroke="#059669" stroke-width="1.5" opacity="0.5"/>
    <line x1="762" y1="275" x2="762" y2="320" stroke="#059669" stroke-width="1.5" opacity="0.5"/>
    <line x1="733" y1="283" x2="769" y2="283" stroke="#059669" stroke-width="1" opacity="0.4"/>
    <line x1="733" y1="293" x2="769" y2="293" stroke="#059669" stroke-width="1" opacity="0.4"/>
    <line x1="733" y1="303" x2="769" y2="303" stroke="#059669" stroke-width="1" opacity="0.4"/>
    <line x1="733" y1="313" x2="769" y2="313" stroke="#059669" stroke-width="1" opacity="0.4"/>
    <!-- Headlight -->
    <rect x="728" y="242" width="22" height="14" rx="4" fill="#FEF9C3" opacity="0.95"/>
    <rect x="728" y="242" width="22" height="14" rx="4" fill="none" stroke="#D97706" stroke-width="1"/>
    <!-- Turn signal -->
    <rect x="728" y="260" width="18" height="8" rx="3" fill="#FCD34D" opacity="0.7"/>
    <!-- Bumper -->
    <rect x="724" y="330" width="55" height="18" rx="5" fill="#1F2937"/>
    <rect x="730" y="334" width="43" height="10" rx="3" fill="#374151"/>
    <!-- Logo badge on cab -->
    <circle cx="665" cy="215" r="14" fill="#F59E0B"/>
    <text x="665" y="219" text-anchor="middle" font-family="Arial Black" font-size="10" fill="#022C22" font-weight="900">PN</text>
  </g>

  <!-- 5th wheel connector -->
  <rect x="543" y="330" width="20" height="22" rx="4" fill="#374151"/>

  <!-- ===== WHEELS ===== -->
  <!-- Trailer wheels -->
  <circle cx="165" cy="395" r="44" fill="#0f172a"/>
  <circle cx="165" cy="395" r="36" fill="#1E293B"/>
  <circle cx="165" cy="395" r="24" fill="#334155"/>
  <circle cx="165" cy="395" r="11" fill="#F59E0B"/>
  <circle cx="165" cy="395" r="5" fill="#D97706"/>
  <line x1="165" y1="371" x2="165" y2="419" stroke="#475569" stroke-width="3.5"/>
  <line x1="141" y1="395" x2="189" y2="395" stroke="#475569" stroke-width="3.5"/>
  <line x1="148" y1="378" x2="182" y2="412" stroke="#475569" stroke-width="3"/>
  <line x1="182" y1="378" x2="148" y2="412" stroke="#475569" stroke-width="3"/>

  <circle cx="270" cy="395" r="44" fill="#0f172a"/>
  <circle cx="270" cy="395" r="36" fill="#1E293B"/>
  <circle cx="270" cy="395" r="24" fill="#334155"/>
  <circle cx="270" cy="395" r="11" fill="#F59E0B"/>
  <circle cx="270" cy="395" r="5" fill="#D97706"/>
  <line x1="270" y1="371" x2="270" y2="419" stroke="#475569" stroke-width="3.5"/>
  <line x1="246" y1="395" x2="294" y2="395" stroke="#475569" stroke-width="3.5"/>
  <line x1="253" y1="378" x2="287" y2="412" stroke="#475569" stroke-width="3"/>
  <line x1="287" y1="378" x2="253" y2="412" stroke="#475569" stroke-width="3"/>

  <!-- Cab rear wheels -->
  <circle cx="640" cy="395" r="44" fill="#0f172a"/>
  <circle cx="640" cy="395" r="36" fill="#1E293B"/>
  <circle cx="640" cy="395" r="24" fill="#334155"/>
  <circle cx="640" cy="395" r="11" fill="#F59E0B"/>
  <circle cx="640" cy="395" r="5" fill="#D97706"/>
  <line x1="640" y1="371" x2="640" y2="419" stroke="#475569" stroke-width="3.5"/>
  <line x1="616" y1="395" x2="664" y2="395" stroke="#475569" stroke-width="3.5"/>
  <line x1="623" y1="378" x2="657" y2="412" stroke="#475569" stroke-width="3"/>
  <line x1="657" y1="378" x2="623" y2="412" stroke="#475569" stroke-width="3"/>

  <!-- Cab front wheels -->
  <circle cx="730" cy="395" r="44" fill="#0f172a"/>
  <circle cx="730" cy="395" r="36" fill="#1E293B"/>
  <circle cx="730" cy="395" r="24" fill="#334155"/>
  <circle cx="730" cy="395" r="11" fill="#F59E0B"/>
  <circle cx="730" cy="395" r="5" fill="#D97706"/>
  <line x1="730" y1="371" x2="730" y2="419" stroke="#475569" stroke-width="3.5"/>
  <line x1="706" y1="395" x2="754" y2="395" stroke="#475569" stroke-width="3.5"/>
  <line x1="713" y1="378" x2="747" y2="412" stroke="#475569" stroke-width="3"/>
  <line x1="747" y1="378" x2="713" y2="412" stroke="#475569" stroke-width="3"/>

  <!-- Speed lines -->
  <line x1="10" y1="278" x2="72" y2="278" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
  <line x1="5" y1="294" x2="65" y2="294" stroke="white" stroke-width="1.5" opacity="0.2"/>
  <line x1="12" y1="262" x2="70" y2="262" stroke="white" stroke-width="1" opacity="0.15"/>
  <line x1="8" y1="310" x2="60" y2="310" stroke="#F59E0B" stroke-width="1" opacity="0.3"/>

  <!-- Status badge (top area) -->
  <rect x="30" y="28" width="170" height="72" rx="14" fill="rgba(5,150,105,0.2)" stroke="#059669" stroke-width="1.5"/>
  <circle cx="58" cy="60" r="8" fill="#022C22"/>
  <circle cx="58" cy="60" r="5" fill="#10B981"/>
  <circle cx="58" cy="60" r="2.5" fill="#34D399" opacity="0.9"/>
  <text x="75" y="48" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">حالة التوصيل</text>
  <text x="75" y="66" font-family="Arial Black, sans-serif" font-size="14" fill="white" font-weight="900">في الطريق إليك</text>
  <text x="75" y="82" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B">ETA: ٤٥ دقيقة</text>

  <!-- Floating data card top right -->
  <rect x="600" y="28" width="165" height="68" rx="14" fill="rgba(5,150,105,0.15)" stroke="#059669" stroke-width="1.5"/>
  <text x="617" y="50" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">الشحنة الحالية</text>
  <text x="617" y="67" font-family="Arial Black, sans-serif" font-size="18" fill="#F59E0B" font-weight="900">٥٠,٠٠٠ L</text>
  <text x="617" y="83" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">ديزل — رياض → جدة</text>
</svg>
